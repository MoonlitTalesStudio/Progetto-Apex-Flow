services:

  redis:
    image: redis/redis-stack-server:latest
    container_name: apex_redis
    ports:
      - "6379:6379"

  
  db:
    image: postgres:15-alpine
    container_name: apex_db
    environment:
      POSTGRES_USER: moonlit
      POSTGRES_PASSWORD: moonlit_tales
      POSTGRES_DB: apex_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moonlit -d apex_database"]
      interval: 5s
      timeout: 5s
      retries: 5

  
  backend:
    build: 
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: apex_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend-api:/app 
    environment:
      DATABASE_URL: postgresql+asyncpg://moonlit:moonlit_tales@db:5432/apex_database
      REDIS_URL: redis://redis:6379
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
    
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data: